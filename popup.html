<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MemeScanner Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="topbar glass">
    <div class="brand">
      <img src="icons/icon48.png" alt="MemeScanner Pro" class="brand-icon">
      <div>
        <h1>MEMESCANNER PRO</h1>
        <p id="uptime" class="mono">00:00:00</p>
      </div>
    </div>
    <div class="topbar-right">
      <button id="toggleScanner" class="toggle" aria-label="Toggle scanner" aria-pressed="true">
        <span class="track"><span class="thumb"></span></span>
      </button>
    </div>
  </header>

  <section class="hud mono glass">
    <article><span>SCANNED</span><strong id="hudScanned">0</strong></article>
    <article><span>MATCHED</span><strong id="hudMatched" class="good">0</strong></article>
    <article><span>REJECTED</span><strong id="hudRejected" class="bad">0</strong></article>
    <article><span>WATCHED</span><strong id="hudWatch">0</strong></article>
  </section>

  <nav class="tabs" id="tabsNav">
    <button class="tab active" data-tab="feed">Feed <em id="badgeFeed">0</em></button>
    <button class="tab" data-tab="watchlist">Watch <em id="badgeWatch">0</em></button>
    <button class="tab" data-tab="settings">Settings</button>
    <button class="tab" data-tab="logs">Logs</button>
  </nav>

  <main class="workspace">
    <section id="tab-feed" class="tab-panel active">
      <div class="panel-head">
        <h2>Live Market Feed</h2>
        <button class="ghost" data-clear="feed">Clear</button>
      </div>
      <div id="feedList" class="list"></div>
    </section>

    <section id="tab-watchlist" class="tab-panel">
      <div class="panel-head">
        <h2>Smart Watchlist</h2>
        <button class="ghost" data-clear="watchlist">Clear</button>
      </div>
      <div id="watchList" class="list"></div>
    </section>

    <section id="tab-settings" class="tab-panel">
      <div class="settings-card glass">
        <h2>Extension UX</h2>

        <label class="field">
          <span>Live Items Per View (higher = zoom out page)</span>
          <select id="liveItemsTarget">
            <option value="10">10 (default)</option>
            <option value="14">14</option>
            <option value="18">18</option>
            <option value="22">22</option>
            <option value="26">26</option>
            <option value="30">30</option>
            <option value="33">33 (max zoom out)</option>
          </select>
        </label>

        <label class="check-field">
          <input id="showAdvancedData" type="checkbox">
          <span>Show full coin details (holders, bundlers, dev/sniper/bot stats, TXNS)</span>
        </label>

        <label class="check-field">
          <input id="launchPinned" type="checkbox">
          <span>Open Axiom / GMGN / Pump in pinned tab</span>
        </label>

        <label class="check-field">
          <input id="launchInBackground" type="checkbox">
          <span>Open in background (do not switch to the website tab)</span>
        </label>

        <label class="field">
          <span>Execution Mode</span>
          <select id="executionMode">
            <option value="live">Live</option>
            <option value="paper">Paper</option>
          </select>
        </label>

        <h3 class="settings-subtitle">Snipe Filters (Auto-Execute)</h3>

        <div class="grid-2">
          <label class="field">
            <span>Max Age (seconds)</span>
            <input id="snipeMaxAgeSeconds" type="number" min="1" step="1" value="120">
          </label>
          <label class="field">
            <span>Min Velocity</span>
            <input id="snipeMinVelocity" type="number" min="0" step="0.01" value="0.03">
          </label>
        </div>

        <div class="grid-2">
          <label class="field">
            <span>Max Top 10 (%)</span>
            <input id="snipeMaxTop10Pct" type="number" min="0" step="0.1" value="15">
          </label>
          <label class="field">
            <span>Default Acquire USD</span>
            <input id="snipeAmountUsd" type="number" min="1" step="1" value="100">
          </label>
        </div>

        <button id="saveSettings" class="primary">Apply Settings</button>
      </div>
    </section>

    <section id="tab-logs" class="tab-panel">
      <div class="panel-head">
        <h2>Runtime Logs</h2>
        <button class="ghost" data-clear="logs">Clear</button>
      </div>
      <div id="logsList" class="logs mono"></div>
    </section>
  </main>

  <footer class="dock glass">
    <button class="dock-link" data-url="https://axiom.trade" title="Open Axiom">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12 12 3l8 9-8 9z"/></svg>
      <span>AXIOM</span>
    </button>
    <button class="dock-link" data-url="https://gmgn.ai" title="Open GMGN">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h8v8H3zM13 10h8v8h-8zM13 3h8v5h-8z"/></svg>
      <span>GMGN</span>
    </button>
    <button class="dock-link" data-url="https://pump.fun" title="Open Pump">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 17V7h2v8h4v2zM13 17V7h2v8h4v2z"/></svg>
      <span>PUMP</span>
    </button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
